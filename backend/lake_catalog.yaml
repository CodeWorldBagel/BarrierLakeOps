# =============================================================
# Lake Catalog — 堰塞湖設定(可由非工程師維護)
# 新增一座堰塞湖 = 加一筆設定,不需修改任何程式碼。
# 欄位說明:
#   id                  : 唯一識別(英數 + 連字號)
#   name_zh             : 中文名稱
#   status              : active | monitoring | archived
#   formed_at           : 形成日期(RFC3339 date)
#   location.centroid   : [lon, lat]
#   threshold.overflow_elevation_m : 溢流高程(公尺)
#   threshold.red_alert_headroom_m : 紅色警戒 headroom 門檻(公尺)
#   threshold.orange_alert_headroom_m / yellow_alert_headroom_m
#   upstream_weather.cwa_stations  : 對應上游 CWA 雨量站代碼
#   landslide_source_location.centroid : [lon, lat] 可選;造成堰塞壩的崩塌源頭,僅供紀錄/顯示,不直接推算下游流向
#   downstream_dem_bbox : [min_lon, min_lat, max_lon, max_lat] 下游 DEM 範圍
#   moa_dataset_id      : data.moa 國有林堰塞湖資料集 id(用於即時對照)
# =============================================================

defaults:
  threshold:
    red_alert_headroom_m: 20.0
    orange_alert_headroom_m: 40.0
    yellow_alert_headroom_m: 70.0

lakes:
  # ---- 主案例 / 發表 demo 場景 ----
  - id: "mataian-2025"
    name_zh: "馬太鞍溪堰塞湖"
    status: "active"
    formed_at: "2025-07-22"
    location:
      centroid: [121.290715, 23.697167]   # 堰塞湖/壩體參考位置(萬榮鄉上游)
    threshold:
      overflow_elevation_m: 250.0
      red_alert_headroom_m: 30.0
      orange_alert_headroom_m: 60.0
      yellow_alert_headroom_m: 90.0
    upstream_weather:
      cwa_stations: ["C0Z100", "C0T9A0"]
    # 下游光復鄉花蓮溪/馬太鞍溪氾濫平原
    downstream_dem_bbox: [121.27, 23.65, 121.48, 23.70]
    moa_dataset_id: "a89"
    reference_state:
      water_level_m: 238.0
      storage_million_m3: 91.0
      observed_at: "2025-09-22T06:00:00+08:00"
      note: "發表 demo 情境基準快照(2025/9/22 紅色警戒前)。堰塞湖即時水位未開放於 open data,此為文件化情境基準,非即時監測值。"
    note: "2025/9/23 溢流潰壩主案例"

