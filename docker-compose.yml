# =============================================================
# 僅本機測試用:起 Postgres container。
# frontend / backend 不進 container(本機直接跑、Zeabur 原生建置)。
# =============================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: barrierlake-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barrierlake}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請在 repo 根目錄 .env 設定 POSTGRES_PASSWORD(見 .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-barrierlake}
    ports:
      - "5432:5432"
    volumes:
      - barrierlake_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-barrierlake}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    container_name: barrierlake-minio
    command: server /data --console-address :9090
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-barrierlake}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?請在 repo 根目錄 .env 設定 MINIO_ROOT_PASSWORD(見 .env.example)}
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - barrierlake_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  barrierlake_pgdata:
  barrierlake_minio:
