# =============================================================
# 僅本機測試用:起 Postgres container。
# frontend / backend 不進 container(本機直接跑、Zeabur 原生建置)。
# =============================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: barrierlake-postgres
    environment:
      POSTGRES_USER: barrierlake
      POSTGRES_PASSWORD: barrierlake
      POSTGRES_DB: barrierlake
    ports:
      - "5432:5432"
    volumes:
      - barrierlake_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barrierlake"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    container_name: barrierlake-minio
    command: server /data --console-address :9090
    environment:
      MINIO_ROOT_USER: barrierlake
      MINIO_ROOT_PASSWORD: barrierlake
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - barrierlake_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  barrierlake_pgdata:
  barrierlake_minio:
